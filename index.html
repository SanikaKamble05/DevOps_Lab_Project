<!DOCTYPE html>
<html>
<head>
    <title>AI Task Tracker</title>

<style>
    body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background: #eef2f7;
        margin: 0;
        padding: 50px;
        display: flex;
        justify-content: center;
    }

    .app {
        width: 600px;
        background: #ffffff;
        border-radius: 14px;
        padding: 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        border: 1px solid #e6eaf0;
    }

    h2 {
        font-size: 22px;
        color: #1f2a37;
        margin-bottom: 20px;
        font-weight: 600;
    }

    input {
        width: 100%;
        padding: 14px;
        border: 1px solid #d0d7de;
        border-radius: 10px;
        font-size: 14px;
        background: #fafbfc;
        outline: none;
    }

    input:focus {
        border-color: #4f46e5;
        background: white;
    }

    button {
        width: 100%;
        margin-top: 12px;
        padding: 12px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #4338ca;
    }

    .section-title {
        margin-top: 28px;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #6b7280;
        font-weight: 600;
    }

   ul {
    list-style: none;
    padding: 0;
    margin-top: 15px;
}

li {
    margin-bottom: 10px;
}

/* ⭐ FIXED ROW LAYOUT */
.task-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;

    padding: 12px 14px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;

    width: 100%;
    box-sizing: border-box;
}

/* checkbox fixed size, no stretching */
.task-check {
    width: 16px;
    height: 16px;
    margin-top: 3px;
    flex-shrink: 0;
}

/* text takes remaining space properly */
.task-text {
    flex: 1;
    font-size: 14px;
    color: #111827;
    line-height: 1.5;

    word-wrap: break-word;
    overflow-wrap: break-word;
}

/* optional points badge */
.points {
    font-size: 11px;
    color: #4f46e5;
    background: #eef2ff;
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
}
    .badge {
        margin-left: auto;
        font-size: 11px;
        background: #eef2ff;
        color: #4f46e5;
        padding: 3px 8px;
        border-radius: 999px;
    }

    .loader {
        display: none;
        margin-top: 10px;
        font-size: 13px;
        color: #6b7280;
    }

    .scoreboard {
    margin-top: 15px;
    padding: 12px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #374151;
    }
</style>
</head>

<body>

<div class="app">

    <h2>AI Task Tracker</h2>

    <input type="text" id="taskInput" placeholder="Enter your task..." />

    <button onclick="generateSubtasks()">Generate Subtasks</button>

    <div class="section-title">Weekly Progress</div>

    <div class="scoreboard">
        <div>Total Points: <span id="totalPoints">0</span></div>
        <div>Week High Score: <span id="weekHigh">0</span></div>
    </div>

    <div class="loader" id="loader">Generating subtasks using AI...</div>

    <div class="section-title">Subtasks</div>
    <ul id="subtaskList"></ul>

</div>

<script>
    let totalPoints = 0;
    let weekHigh = 0;

    function updatePoints(checked) {
        if (checked) {
            totalPoints += 2;
        } else {
            totalPoints -= 2;
        }

        if (totalPoints < 0) totalPoints = 0;

        if (totalPoints > weekHigh) {
            weekHigh = totalPoints;
        }

        document.getElementById("totalPoints").innerText = totalPoints;
        document.getElementById("weekHigh").innerText = weekHigh;
    }

    function displayFallback(task) {
    const container = document.getElementById("subtaskList");
    container.innerHTML = "";

    const fallbackTasks = [
        task, // ⭐ always include original task
        "AI service temporarily unavailable",
        "Retry generation for detailed subtasks"
    ];

    fallbackTasks.forEach(t => {
        const li = document.createElement("li");

        li.innerHTML = `
            <label class="task-row">
                <input type="checkbox" class="task-check">
                <span class="task-text">${t}</span>
                <span class="points">+1 pt</span>
            </label>
        `;

        container.appendChild(li);
    });
}

let mainTaskDone = false;
let subtaskStates = [];

function displayTaskWithSubtasks(task, subtasks) {
    const container = document.getElementById("subtaskList");
    container.innerHTML = "";

    subtaskStates = new Array(subtasks.length).fill(false);

    // ⭐ MAIN TASK
    const main = document.createElement("li");

    main.innerHTML = `
        <label class="task-row" style="background:#e0e7ff;">
            <input type="checkbox" onchange="toggleMainTask(this, ${subtasks.length})">
            <span class="task-text"><b>Main Task:</b> ${task}</span>
        </label>
    `;

    container.appendChild(main);

    // ⭐ SUBTASKS
    subtasks.forEach((t, index) => {
        const li = document.createElement("li");

        li.innerHTML = `
            <label class="task-row">
                <input type="checkbox" onchange="toggleSubtask(${index}, ${subtasks.length})">
                <span class="task-text">${t}</span>
            </label>
        `;

        container.appendChild(li);
    });
}

function toggleSubtask(index, total) {
    subtaskStates[index] = !subtaskStates[index];

    const allDone = subtaskStates.every(v => v === true);

    if (allDone) {
        alert("🎉 All subtasks completed! Main task done.");
    }
}

function toggleMainTask(checkbox, total) {
    if (checkbox.checked) {
        subtaskStates = subtaskStates.map(() => true);

        document.querySelectorAll("#subtaskList input[type='checkbox']")
            .forEach(cb => cb.checked = true);
    } else {
        subtaskStates = subtaskStates.map(() => false);

        document.querySelectorAll("#subtaskList input[type='checkbox']")
            .forEach(cb => cb.checked = false);
    }
}

    async function generateSubtasks() {
    const task = document.getElementById("taskInput").value;

    const res = await fetch('http://127.0.0.1:5000/generate_subtasks', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ task })
    });

    let data;

    try {
        data = await res.json();
    } catch (e) {
        displayFallback(task);
        return;
    }

    if (!res.ok || !data.subtasks) {
        displayFallback(task);
        return;
    }

    displayTaskWithSubtasks(data.task, data.subtasks);
}
</script>

</body>
</html>
